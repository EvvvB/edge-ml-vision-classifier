name: edge-ml-cloud-api

services:
  postgres:
    image: postgres:16.14-alpine
    environment:
      POSTGRES_DB: vision_classifier
      POSTGRES_USER: vision
      POSTGRES_PASSWORD: vision
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vision -d vision_classifier"]
      interval: 2s
      timeout: 3s
      retries: 15

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 15

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - >
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/vision-detections
    restart: "no"

volumes:
  postgres-data:
  minio-data:
